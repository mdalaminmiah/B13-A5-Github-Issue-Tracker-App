<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub Issues Tracker - Login</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            'github-dark': '#24292f',
                            'brand-purple': '#5811FF',
                        },
                    },
                },
            };
        </script>
        <style>
            /* Strict No-Scroll Rules */
            html,
            body {
                height: 100%;
                margin: 0;
                overflow: hidden;
                background-color: #f8fafc;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px; /* Small safety gap for the very edges */
            }
        </style>
    </head>
    <body>
        <div
            class="bg-white px-8 py-6 rounded-2xl shadow-xl shadow-gray-200/50 w-full max-w-[440px] border border-gray-100 flex flex-col"
        >
            <div class="flex flex-col items-center mb-4">
                <svg
                    height="45"
                    viewBox="0 0 16 16"
                    width="45"
                    class="fill-github-dark"
                >
                    <path
                        d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
                    ></path>
                </svg>
                <h1 class="text-xl font-bold text-gray-800 mt-2 tracking-tight">
                    GitHub Issues Tracker
                </h1>
                <p class="text-gray-400 text-[11px]">
                    Sign in to manage your issues
                </p>
            </div>

            <div class="space-y-3">
                <div>
                    <label
                        class="block text-[11px] font-semibold text-gray-700 mb-1"
                    >
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        placeholder="Enter Username"
                        class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-purple/10 focus:border-brand-purple transition-all text-sm"
                    />
                    <p class="text-[10px] text-brand-purple mt-1 font-medium">
                        Default: admin
                    </p>
                </div>

                <div>
                    <label
                        class="block text-[11px] font-semibold text-gray-700 mb-1"
                    >
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter Password"
                        class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-purple/10 focus:border-brand-purple transition-all text-sm"
                    />
                    <p class="text-[10px] text-brand-purple mt-1 font-medium">
                        Default: admin123
                    </p>
                </div>

                <button
                    id="login-btn"
                    class="w-full bg-brand-purple text-white py-3 rounded-xl font-bold text-sm hover:opacity-95 active:scale-[0.98] transition-all shadow-md mt-1"
                >
                    Sign In
                </button>

                <div class="flex items-center py-1">
                    <div class="grow border-t border-gray-100"></div>
                    <span
                        class="px-3 text-[9px] text-gray-400 font-bold uppercase tracking-widest"
                    >
                        OR
                    </span>
                    <div class="grow border-t border-gray-100"></div>
                </div>

                <div
                    class="bg-gray-50 rounded-xl py-3 px-2 text-center border border-gray-100"
                >
                    <p
                        class="text-[9px] text-gray-400 mb-1 uppercase font-bold"
                    >
                        Demo Credentials:
                    </p>
                    <div class="text-[13px] text-gray-700 leading-tight">
                        <p>
                            <span class="font-bold">Username:</span>
                            admin
                        </p>
                        <p>
                            <span class="font-bold">Password:</span>
                            admin123
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document
                .getElementById('login-btn')
                .addEventListener('click', () => {
                    const user = document.getElementById('username').value;
                    const pass = document.getElementById('password').value;
                    if (user === 'admin' && pass === 'admin123') {
                        window.location.href = 'main.html';
                    } else {
                        alert('Invalid Credentials!');
                    }
                });
        </script>
    </body>
</html>
